name: PoC CI/CD to Alibaba Cloud ACK

on:
  push:
    branches:
      - main

env:
  ACR_REGISTRY: registry-intl.ap-southeast-5.aliyuncs.com
  ACR_NAMESPACE: gandes-test
  ACR_REPO: gandes-github
  ACR_REGION: ap-southeast-5

jobs:
  # ==================== CI: BUILD & PUSH TO ACR ====================
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Alibaba Cloud ACR
        run: |
          docker login -u ${{ secrets.ALIBABA_ACCESS_KEY_ID }} -p ${{ secrets.ALIBABA_ACCESS_KEY_SECRET }} ${{ env.ACR_REGISTRY }}

      - name: Build Docker Image
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build -t ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.ACR_REPO }}:$IMAGE_TAG .
          docker tag ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.ACR_REPO }}:$IMAGE_TAG ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.ACR_REPO }}:latest
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Push Docker Image to ACR
        run: |
          docker push ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.ACR_REPO }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.ACR_REPO }}:latest

  # ==================== CD: DEPLOY TO ACK ====================
  deploy-to-ack:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.ACK_KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy to ACK
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl rollout status deployment/my-app-deployment --timeout=300s