name: Build and Deploy to ACK (Official Alibaba Cloud)

on:
  push:
    branches: [ "main" ]

env:
  # Sesuaikan dengan region dan detail ACR Anda
  REGION_ID: ap-southeast-5
  REGISTRY: registry-intl.ap-southeast-5.aliyuncs.com
  NAMESPACE: gandes-test
  IMAGE: gandes-github
  TAG: ${{ github.sha }}
  
  # Kita akan isi ini di GitHub Secrets
  ACK_CLUSTER_ID: ${{ secrets.ACK_CLUSTER_ID }}

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 1. Login ke ACR menggunakan Official Action
    - name: Login to ACR
      uses: aliyun/acr-login@v1
      with:
        region-id: "${{ env.REGION_ID }}"
        access-key-id: "${{ secrets.ACCESS_KEY_ID }}"
        access-key-secret: "${{ secrets.ACCESS_KEY_SECRET }}"

    # 2. Build dan Push Image
    - name: Build and push image to ACR
      run: |
        docker build --tag "${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE }}:${{ env.TAG }}" .
        docker push "${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE }}:${{ env.TAG }}"
        
        # Opsional: Push juga sebagai 'latest' agar deployment.yaml Anda yang pakai ':latest' tetap bekerja
        docker tag "${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE }}:${{ env.TAG }}" "${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE }}:latest"
        docker push "${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE }}:latest"

    # 3. Setup Kubectl Context ke ACK secara otomatis
    - name: Set ACK K8s context
      uses: aliyun/ack-set-context@v1
      with:
        access-key-id: "${{ secrets.ACCESS_KEY_ID }}"
        access-key-secret: "${{ secrets.ACCESS_KEY_SECRET }}"
        cluster-id: "${{ env.ACK_CLUSTER_ID }}"

    # 4. Deploy ke ACK
    - name: Deploy to ACK
      run: |
        echo "Deploying to cluster..."
        kubectl apply -f k8s/deployment.yaml
        kubectl rollout status deployment/my-app-deployment --timeout=300s
        echo "Deployment successful!"