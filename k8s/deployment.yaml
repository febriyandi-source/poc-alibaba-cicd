apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app-deployment
  labels:
    app: my-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
      - name: my-app
        # TAG 'latest' akan diganti otomatis oleh GitHub Actions nanti
        image: registry-intl.ap-southeast-5.aliyuncs.com/gandes-test/gandes-github:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: my-app-service
spec:
  type: LoadBalancer # Ini akan membuat SLB (Load Balancer) di Alibaba Cloud
  selector:
    app: my-app
  ports:
    - port: 80
      targetPort: 80